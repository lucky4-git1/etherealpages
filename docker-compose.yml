version: "3.8"

services:
  # Database
  db:
    image: mysql:8.0
    container_name: bookstore_db
    environment:
      MYSQL_DATABASE: bookstore
      MYSQL_USER: bookstore_user
      MYSQL_PASSWORD: bookstore_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bookstore_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build: ./backend
    container_name: bookstore_api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/bookstore
      SPRING_DATASOURCE_USERNAME: bookstore_user
      SPRING_DATASOURCE_PASSWORD: bookstore_password
      APPLICATION_SECURITY_JWT_SECRET_KEY: your_secure_jwt_key_change_this
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookstore_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/books"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
        VITE_GOOGLE_CLIENT_ID: your_google_client_id_here
    container_name: bookstore_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bookstore_network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  db_data:

networks:
  bookstore_network:
    driver: bridge
