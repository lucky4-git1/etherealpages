services:
  - type: web
    name: ethereal-pages-backend
    env: docker
    rootDir: backend
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8080
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-netlify-url.netlify.app,http://localhost:5173
      - key: GOOGLE_CLIENT_ID
        value: 981511112143-vrko9g9etdi31pc5n0698d0mshluehk5.apps.googleusercontent.com
    disk:
      name: bookstore-data
      mountPath: /app/data
      sizeGB: 1
