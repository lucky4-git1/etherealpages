spring.application.name=bookstore

# Database configuration - Fallback to local H2 if DB_URL not provided
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/bookstore;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Secret Properties - ALWAYS override in production!
application.security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# Google OAuth - ALWAYS override in production!
google.client.id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}

# Server Configuration
server.port=${PORT:8081}
server.servlet.context-path=/

# CORS Configuration
application.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,https://*.netlify.app}

