spring.application.name=bookstore

# Database Configuration - Production
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_db?useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=bookstore_user
spring.datasource.password=your_secure_password_here
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT Secret Properties
# IMPORTANT: Change this secret key in production to a unique, secure value
application.security.jwt.secret-key=your_secure_jwt_secret_key_change_this_in_production
application.security.jwt.expiration=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=WARN
logging.level.com.bookstore=INFO
logging.level.org.springframework.security=WARN
